name = "OFedora"
description = "An opinionated Fedora distribution."

# GNOME desktop
[[packages]]
name = "@workstation-product-environment"
version = "*"

# GNOME mail clinet
[[packages]]
name = "evolution"
version = "*"

[[packages]]
name = "fish"
version = "*"

