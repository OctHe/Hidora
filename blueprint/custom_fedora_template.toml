name = "OFedora"
description = "An opinionated Fedora distribution."

# GNOME desktop
[[packages]]
name = "@workstation-product-environment"
version = "*"

# GNOME mail clinet
[[packages]]
name = "evolution"
version = "*"

[[packages]]
name = "fish"
version = "*"

[[customizations.directories]]
path = "/etc/skel/.config/fish"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.files]]
path = "/etc/skel/.config/fish/config.fish"
mode = "0644"
user = "root"
group = "root"
data = '''
{{INSERT_FISH_CONFIG}}
'''

[[packages]]
name = "vim-enhanced"
version = "*"

[[customizations.directories]]
path = "/etc/skel/.vim"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.files]]
path = "/etc/skel/.vim/vimrc"
mode = "0644"
user = "root"
group = "root"
data = '''
{{INSERT_VIM_CONFIG}}
'''

[[packages]]
name = "screenfetch"
version = "*"

[[packages]]
name = "tmux"
version = "*"

[[customizations.directories]]
path = "/etc/skel/.config/tmux"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.files]]
path = "/etc/skel/.config/tmux/tmux.conf"
mode = "0644"
user = "root"
group = "root"
data = '''
{{INSERT_TMUX_CONFIG}}
'''

[[packages]]
name = "ctags"
version = "*"

[[packages]]
name = "cscope"
version = "*"

[[packages]]
name = "python3-pip"
version = "*"

[[packages]]
name = "python3-autopep8"
version = "*"

[[customizations.user]]
name = "root"
password = "31415926"

[[customizations.user]]
name = "Fedora"
password = "31415926"
shell = "/bin/fish"
groups = ["wheel"]

# Highlight info
[[packages]]
name = "info"
version = "*"

[[customizations.files]]
path = "/etc/skel/.infokey"
mode = "0644"
user = "root"
group = "root"
data = """
#var
link-style=yellow
active-link-style=yellow,bold
match-style=underline,bold,nocolor
"""

# Desktop icon for commands
[[customizations.directories]]
path = "/etc/skel/.local"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.directories]]
path = "/etc/skel/.local/share"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.directories]]
path = "/etc/skel/.local/share/applications"
mode = "0755"
user = "root"
group = "root"
ensure_parents = false

[[customizations.files]]
path = "/etc/skel/.local/share/applications/top.desktop"
mode = "0644"
user = "root"
group = "root"
data = """
[Desktop Entry]
Name=top
Type=Application
Exec=top
Terminal=true
"""
